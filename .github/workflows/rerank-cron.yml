name: ClearLane v3 recompute (5-min cron)

# Free ~5-minute trigger for the live recompute, since Vercel Hobby crons are
# limited to once/day. Hits the ONE v3 recalc endpoint, which (every call) refreshes
# online learning + the day-shaped heatmap cache, fetches live Mappls typical-traffic
# congestion at most once per 5 min (quota-friendly) with a graceful fall back to the
# simulation, and persists everything to MongoDB. Reads serve the cached snapshot.
#
# Set the repo secret CLEARLANE_CRON_SECRET (Settings → Secrets → Actions) to the
# same value as the Vercel env var. GitHub's scheduler can lag a few minutes.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}        # manual "Run workflow" from the Actions tab

concurrency:                   # don't pile up overlapping runs
  group: v3-recompute
  cancel-in-progress: true

jobs:
  recompute:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/v3/cron/recompute
        run: |
          curl -fsS \
            "https://clearlane-arisyn.vercel.app/api/v3/cron/recompute?token=${{ secrets.CLEARLANE_CRON_SECRET }}" \
            -o /dev/null -w "recompute HTTP %{http_code} in %{time_total}s\n"
